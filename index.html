<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MLB Live Performance Context</title>
<style>
body{font-family:system-ui;background:#f6f7f9;padding:24px}
.card{background:white;padding:16px;border-radius:12px;margin-bottom:12px}
.meta{font-size:14px;color:#444}
.badge{padding:2px 6px;border-radius:6px;font-size:12px;font-weight:600}
.confirmed{background:#16a34a;color:white}
.monitor{background:#fbbf24}
</style>
</head>

<body>

<h1>MLB Performance Context</h1>
<p style="color:#555;font-size:14px;">
Updated hourly. Live stats update automatically during games.
</p>

<div id="content">Loading…</div>

<script>
fetch("/MLB-DASHBOARD/daily.json?"+Date.now())
.then(r=>r.json())
.then(d=>{
  const c=document.getElementById("content");
  d.games.forEach(g=>{
    const card=document.createElement("div");
    card.className="card";

    function pBlock(p){
      if(p.status!=="confirmed") return "TBD";

      return `
        ${p.name} (${p.hand}HP)<br>
        ERA: ${p.era}<br>
        Last 5 Starts:<br>
        IP Avg: ${p.last5.avg_ip}<br>
        K Avg: ${p.last5.avg_k}<br>
        BB Avg: ${p.last5.avg_bb}
      `;
    }

    card.innerHTML=`
      <strong>${g.away_team} @ ${g.home_team}</strong><br>
      <div class="meta">
        Away SP:<br>${pBlock(g.away_pitcher)}<br><br>
        Home SP:<br>${pBlock(g.home_pitcher)}<br>
        Venue: ${g.venue}<br>
        Start: ${new Date(g.start_time).toLocaleString()}
      </div>
    `;
    c.appendChild(card);
  });
});
</script>

</body>
</html>
