name: Run MLB Engine

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # Morning ET
    - cron: "0 10 * * *"  # Late morning ET
    - cron: "0 14 * * *"  # Afternoon ET
    - cron: "0 18 * * *"  # Evening ET

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: python run_engine.py
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add daily.json
          git commit -m "Daily performance context update" || echo "No change"
          git push
