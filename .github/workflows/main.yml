name: MLB Dashboard Engine

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

jobs:
  run-engine:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Run MLB engine
        run: python run_engine.py
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # ✅ Add ONLY files that actually exist
          git add daily.json live.json postgame.json || true
          git add daily_recap.json || true

          git commit -m "Update MLB dashboard data" || echo "No changes"
          git push
