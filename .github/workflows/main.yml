name: MLB Dashboard Engine

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    # ✅ Run every minute for live updates
    - cron: "* * * * *"

jobs:
  run-engine:
    runs-on: ubuntu-latest

    # ✅ Prevent overlapping runs (critical for live accuracy)
    concurrency:
      group: live-mlb-dashboard
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ THIS IS THE FIX FOR YOUR ERROR
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install openai

      - name: Run MLB engine
        run: python run_engine.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily.json live.json postgame.json daily_recap.json
          git commit -m "Update MLB dashboard data" || echo "No changes"
          git push
