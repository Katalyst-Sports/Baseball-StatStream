name: MLB Context Engine

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"        # Daily baseline (pre-game)
    - cron: "*/2 * * * *"      # Live + postgame updates

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run MLB Engine
        run: python run_engine.py

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily.json live.json postgame.json
          git commit -m "MLB data update" || echo "No changes"
          git push
